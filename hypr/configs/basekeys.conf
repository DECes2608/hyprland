# Ses
bindl = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bindl = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindl = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = ,XF86AudioPlay,        exec, playerctl -p spotify play-pause
bindl = ,XF86AudioStop,        exec, playerctl stop
bindl = ,XF86AudioPrev,        exec, playerctl previous
bindl = ,XF86AudioNext,        exec, playerctl next

# Şarkı geçişi kolay
#bind = SUPER, X,             exec, playerctl next
#bind = SUPER, Z,             exec, playerctl previous


# Parlaklık
bind = ,XF86MonBrightnessUp,   exec, brightnessctl --class=backlight set +10%
bind = ,XF86MonBrightnessDown, exec, brightnessctl --class=backlight set 10%-

# Ekran görüntüsü
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, A, exec, mkdir -p ~/Belgeler/Ekran/ && grim -g "$(slurp)" ~/Belgeler/Ekran//$(date +%Y-%m-%d-%H%M%S).png

# Pencere yönetimi
bind = SUPER,       Q,     killactive
bind = SUPER,       F,     fullscreen, 1
bind = SUPER SHIFT, F,     fullscreen, 0
bind = SUPER,       Space, togglefloating

# Odaklanma — yön tuşları
bind = SUPER, Left,  movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up,    movefocus, u
bind = SUPER, Down,  movefocus, d

# Odaklanma — HJKL
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# Odaklanma — Z/X
bind = SUPER, Z, movefocus, l
bind = SUPER, X, movefocus, r

# Pencere taşıma — yön tuşları
bind = SUPER CTRL, Left,  movewindow, l
bind = SUPER CTRL, Right, movewindow, r
bind = SUPER CTRL, Up,    movewindow, u
bind = SUPER CTRL, Down,  movewindow, d

# Pencere taşıma — HJKL
bind = SUPER CTRL, H, movewindow, l
bind = SUPER CTRL, J, movewindow, d
bind = SUPER CTRL, K, movewindow, u
bind = SUPER CTRL, L, movewindow, r

# Monitör odağı
bind = SUPER SHIFT, Left,  focusmonitor, l
bind = SUPER SHIFT, Right, focusmonitor, r
bind = SUPER SHIFT, Up,    focusmonitor, u
bind = SUPER SHIFT, Down,  focusmonitor, d
bind = SUPER SHIFT, H,     focusmonitor, l
bind = SUPER SHIFT, J,     focusmonitor, d
bind = SUPER SHIFT, K,     focusmonitor, u
bind = SUPER SHIFT, L,     focusmonitor, r

# Pencereyi monitöre taşı
bind = SUPER CTRL SHIFT, Left,  movewindow, mon:l
bind = SUPER CTRL SHIFT, Right, movewindow, mon:r
bind = SUPER CTRL SHIFT, Up,    movewindow, mon:u
bind = SUPER CTRL SHIFT, Down,  movewindow, mon:d
bind = SUPER CTRL SHIFT, H,     movewindow, mon:l
bind = SUPER CTRL SHIFT, J,     movewindow, mon:d
bind = SUPER CTRL SHIFT, K,     movewindow, mon:u
bind = SUPER CTRL SHIFT, L,     movewindow, mon:r

# Workspace geçişi
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up,   workspace, e-1
bind = SUPER, U,         workspace, e+1
bind = SUPER, I,         workspace, e-1

# Pencereyi workspace'e taşı
bind = SUPER CTRL, Page_Down, movetoworkspace, e+1
bind = SUPER CTRL, Page_Up,   movetoworkspace, e-1
bind = SUPER CTRL, U,         movetoworkspace, e+1
bind = SUPER CTRL, I,         movetoworkspace, e-1

# Mouse scroll ile workspace
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# Workspace 1–10 geçişi
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Pencereyi workspace'e taşı (1–10)
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Boyut değiştirme (resizeactive ile)
binde = SUPER,       minus, resizeactive, -10% 0
binde = SUPER,       equal, resizeactive, 10% 0
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

# Pencere Taşıma
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
