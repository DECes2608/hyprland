#monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1
monitor = eDP-1, 1920x1080@60.01, 0x0, 1

input {
    kb_layout    = tr
    repeat_rate  = 35
    repeat_delay = 300
    numlock_by_default = true


    follow_mouse = 1
    mouse_refocus = true

    touchpad {
        tap-to-click         = true
        natural_scroll       = true
        disable_while_typing = false
        gesture = 3, vertical, workspace
        gesture = 3, left, dispatcher, exec, playerctl -p spotify next
        gesture = 3, right, dispatcher, exec, playerctl -p spotify ssprevious
        gesture = 2, pinchout, fullscreen
        gesture = 2, pinchin, dispatcher, killactive
    }

    sensitivity = -0.5
}

device {
    name = synaptics-tm3336-001
    sensitivity = -0.3
    accel_profile = adaptive
}

cursor {
    no_warps = true
}
